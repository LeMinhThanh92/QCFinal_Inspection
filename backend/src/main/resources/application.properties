# ─── Server ───────────────────────────────────────────────────────
server.port=6664
server.address=0.0.0.0
server.servlet.context-path=/api/v2

# ─── Response Compression (critical for large datasets 50K+ rows) ─
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ─── Timeout ──────────────────────────────────────────────────────
spring.mvc.async.request-timeout=30000
server.tomcat.connection-timeout=30000

# ─── Tomcat Thread Pool ───────────────────────────────────────────
server.tomcat.threads.max=300
server.tomcat.threads.min-spare=20

# ─── SQL Server DataSource ────────────────────────────────────────
# Note: SQL Server uses TLS 1.0 — need to enable it in Java 17
spring.datasource.url=jdbc:sqlserver://192.168.1.245:1433;databaseName=DtradeProduction;encrypt=false;trustServerCertificate=true;sslProtocol=TLSv1
spring.datasource.username=user_prog2
spring.datasource.password=qrOZW$v6e1MT
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ─── Connection Pool (HikariCP) ───────────────────────────────────
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.leak-detection-threshold=60000

# ─── JWT ──────────────────────────────────────────────────────────
